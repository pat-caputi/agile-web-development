<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account · LiftAGILE</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-wrap { width:100%; max-width:400px; padding:16px; }
    .auth-logo { font-size:22px; font-weight:600; letter-spacing:-0.5px; text-align:center; margin-bottom:28px; }
    .auth-logo span { color:var(--accent); }
    .auth-card { background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--radius-xl); padding:28px; }
    .auth-title { font-size:18px; font-weight:600; letter-spacing:-0.3px; margin-bottom:4px; }
    .auth-sub { font-size:13px; color:var(--text-secondary); margin-bottom:22px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:12.5px; font-weight:500; color:var(--text-secondary); margin-bottom:6px; }
    .field input { width:100%; padding:10px 14px; border:0.5px solid var(--border-md); border-radius:var(--radius-md); background:var(--surface-2); font-family:var(--font); font-size:14px; color:var(--text-primary); transition:border-color 0.15s; }
    .field input:focus { outline:none; border-color:var(--accent); background:var(--surface); }
    .auth-footer { text-align:center; margin-top:18px; font-size:13px; color:var(--text-secondary); }
    .auth-footer a { color:var(--accent); text-decoration:none; font-weight:500; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">Lift<span>AGILE</span></div>
    <div class="auth-card">
      <div class="auth-title">Create account</div>
      <div class="auth-sub">Start tracking and competing</div>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="your_username" autocomplete="username">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn btn-primary btn-block" style="margin-top:6px;"
              onclick="window.location='dashboard.html'">Create account</button>
    </div>
    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</body>
</html>
