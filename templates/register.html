<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account · LiftAGILE</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-wrap { width:100%; max-width:400px; padding:16px; }
    .auth-logo { font-size:22px; font-weight:600; letter-spacing:-0.5px; text-align:center; margin-bottom:28px; }
    .auth-logo span { color:var(--accent); }
    .auth-card { background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--radius-xl); padding:28px; }
    .auth-title { font-size:18px; font-weight:600; letter-spacing:-0.3px; margin-bottom:4px; }
    .auth-sub { font-size:13px; color:var(--text-secondary); margin-bottom:22px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:12.5px; font-weight:500; color:var(--text-secondary); margin-bottom:6px; }
    .field input { width:100%; padding:10px 14px; border:0.5px solid var(--border-md); border-radius:var(--radius-md); background:var(--surface-2); font-family:var(--font); font-size:14px; color:var(--text-primary); transition:border-color 0.15s; }
    .field input:focus { outline:none; border-color:var(--accent); background:var(--surface); }
    .auth-footer { text-align:center; margin-top:18px; font-size:13px; color:var(--text-secondary); }
    .auth-footer a { color:var(--accent); text-decoration:none; font-weight:500; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">Lift<span>AGILE</span></div>
    <div class="auth-card">
      <div class="auth-title">Create account</div>
      <div class="auth-sub">Start tracking and competing</div>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="error-msg">
            {{ messages[0] }}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter Your Username"
          autocomplete="username" value="{{ username or '' }}">
        </div>

          <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter Your Email" autocomplete="email" value="{{ email or '' }}">
          <small class="error-text"></small>
  </div>


        <div class="field password-field">
          <label for="password">Password</label>

          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter Password" autocomplete="new-password" minlength="8" required>
            <button type="button" class="toggle-password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <small class="error-text"></small>
        </div>
          

      <div class="field password-field">
        <label for="confirm">Confirm password</label>

        <div class="password-wrapper">
          <input type="password" id="confirm" name="confirm" placeholder="Confirm Password" autocomplete="new-password" minlength="8" required>
          <button type="button" class="toggle-password">
              <i class="fa-solid fa-eye"></i>
            </button>
        </div>

        <small class="error-text"></small>
      </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top:6px;">
          Create account
        </button>
      </form>
</div>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
