<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · LiftAGILE</title>
  <script>
    if (performance.navigation && performance.navigation.type === 1) {
      sessionStorage.removeItem('liftlab-theme');
    }
    document.documentElement.setAttribute(
      'data-theme',
      sessionStorage.getItem('liftlab-theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
    );
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-wrap { width:100%; max-width:400px; padding:16px; }
    .auth-logo { font-size:22px; font-weight:600; letter-spacing:-0.5px; text-align:center; margin-bottom:28px; }
    .auth-logo span { color:var(--accent); }
    .auth-card { background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--radius-xl); padding:28px; }
    .auth-title { font-size:18px; font-weight:600; letter-spacing:-0.3px; margin-bottom:4px; }
    .auth-sub { font-size:13px; color:var(--text-secondary); margin-bottom:22px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:12.5px; font-weight:500; color:var(--text-secondary); margin-bottom:6px; }
    .field input { width:100%; padding:10px 14px; border:0.5px solid var(--border-md); border-radius:var(--radius-md); background:var(--surface-2); font-family:var(--font); font-size:14px; color:var(--text-primary); transition:border-color 0.15s; }
    .field input:focus { outline:none; border-color:var(--accent); background:var(--surface); box-shadow: 0 0 0 3px rgba(124, 106, 245, 0.15); }
    .auth-footer { text-align:center; margin-top:18px; font-size:13px; color:var(--text-secondary); }
    .auth-footer a { color:var(--accent); text-decoration:none; font-weight:500; }
    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(8px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    .auth-card.shake {
      animation: shake 0.45s ease;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">Lift<span>AGILE</span></div>
    <div class="auth-card" id="loginCard">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to track your workouts</div>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="error-msg">
            <span>⚠️</span>
            <span>{{ messages[0] }}</span>
          </div>
        {% endif %}
      {% endwith %}
      <form method="POST" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
          <label for="username">Username or Email</label>
          <input type="text" id="username" name="username" placeholder="Username or Email" required>
        </div>
        <div class="field password-field">
          <label for="password">Password</label>

          <div class="password-wrapper">
            <input type="password" id="password" name="password" required>
            <button type="button" class="toggle-password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:6px;">
        Sign in
        </button>
      </form>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </div>
  </div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<script>
  const hasError = {{ 'true' if get_flashed_messages() else 'false' }};

  if (hasError) {
    const card = document.getElementById('loginCard');

    if (card) {
      card.classList.add('shake');

      card.addEventListener('animationend', () => {
        card.classList.remove('shake');
      });
    }
  }
</script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
